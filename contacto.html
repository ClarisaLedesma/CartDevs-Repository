<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Pagina de e-commerces" />
    <meta name="keywords" content="e-commerces - web - gaming - products" />
    <meta name="author" content="Ledesma Clarisa" />
    <link rel="shortcut icon" href="assets/logotipo.png" type="image/x-icon" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&family=Rubik+Glitch&family=Rubik+Mono+One&family=Special+Gothic+Expanded+One&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee&family=Rethink+Sans:ital,wght@0,400..800;1,400..800&family=Rubik+Mono+One&family=Special+Gothic+Expanded+One&display=swap"
      rel="stylesheet"
    />
    <title>Nexora Shop</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./contacto.css" />
  </head>
  <body>
    <header></header>
    <main>
      <!-- //CONTACT -->

      <section class="contact">
        <div class="row">
          <article class="col-lg-6">
            <span class="span-top">CONTÁCTANOS</span>
            <h2 class="d-flex h2-top">
              Envíanos un
              <div class="mx-2">mensaje</div>
            </h2>
            <p class="p-top">
              Completa el formulario y nuestro equipo te responderá lo antes
              posible.
            </p>
            <form action="">
              <div class="row form">
                <div class="col-lg">
                  <div class="name-surname d-flex flex-column">
                    <label for="name">Nombre completo</label>
                    <input type="text" name="" id="name" />
                  </div>
                  <div class="email d-flex flex-column">
                    <label for="email">Email</label>
                    <input type="email" name="" id="email" />
                  </div>
                  <div class="tel d-flex flex-column">
                    <label for="tel">Telefono</label>
                    <input type="tel" name="" id="tel" />
                  </div>
                </div>
                <div class="col-lg">
                  <div class="dropdown d-flex flex-column">
                    <label for="dropdown">Asunto</label>
                    <select name="Asunto" id="dropdown">
                      <option>Soporte técnico</option>
                      <option>Pedido</option>
                      <option>Devolución</option>
                      <option>Otro</option>
                    </select>
                  </div>
                  <div class="message d-flex flex-column">
                    <label for="message">Mensaje</label>
                    <textarea name="" id="message"></textarea>
                  </div>
                  <div class="button">
                    <button type="submit">ENVIAR</button>
                  </div>
                </div>
              </div>
            </form>
          </article>
          <!-- /// -->
          <article class="col-lg-6 iframe"></article>
        </div>
      </section>

      <!-- //FOOTER -->
      <footer class="footer-nexora">
        <div class="container">
          <div class="row align-items-center text-center text-lg-start">
            <div class="col-12 col-md-6 col-lg-4 mb-4 mb-lg-0">
              <img
                src="assets/logotipo.png"
                alt="Logo Nexora"
                class="footer-logo"
              />

              <p class="footer-description">
                Tecnología, gaming y los mejores productos para potenciar tu
                experiencia digital.
              </p>
            </div>

            <div class="col-12 col-md-6 col-lg-4 mb-4 mb-lg-0">
              <h5 class="footer-title">Seguinos</h5>

              <div class="footer-social">
                <a href="#"><i class="bi bi-instagram"></i></a>
                <a href="#"><i class="bi bi-facebook"></i></a>
                <a href="#"><i class="bi bi-tiktok"></i></a>
                <a href="#"><i class="bi bi-twitter-x"></i></a>
              </div>
            </div>

            <div class="col-12 col-lg-4">
              <h5 class="footer-title">Métodos de Pago</h5>

              <div class="footer-payments">
                <i class="bi bi-credit-card"></i>
                <i class="bi bi-credit-card-2-front"></i>
                <i class="bi bi-wallet2"></i>
                <i class="bi bi-bank"></i>
              </div>
            </div>
          </div>

          <hr class="footer-divider" />

          <div class="footer-bottom">
            <p>© 2026 Nexora Shop - Todos los derechos reservados.</p>
          </div>
        </div>
      </footer>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
